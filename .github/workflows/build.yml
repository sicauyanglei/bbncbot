name: Build APK

# 在线编译：推送到 main 或手动触发时自动编译 release APK 并发布到 Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 发布 Release 需要 write 权限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        # ubuntu-latest runner 自带 Android SDK，直接配置环境变量即可
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" 2>/dev/null || true
          if [ ! -d "$ANDROID_HOME/platforms/android-34" ]; then
            yes | sdkmanager --licenses >/dev/null 2>&1 || true
            sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Verify release keystore
        # 仓库已固定提交 release.keystore，保证每次 CI 签名一致，APK 可覆盖安装
        run: |
          if [ ! -f app/release.keystore ]; then
            echo "::error::app/release.keystore 不存在，请确认已提交到仓库"
            exit 1
          fi
          echo "release.keystore exists ($(stat -c%s app/release.keystore) bytes)"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK with commit sha
        id: rename
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          cp app/build/outputs/apk/release/app-release.apk bbncbot-${SHORT_SHA}.apk
          echo "apk_path=bbncbot-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT
          echo "apk_name=bbncbot-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbncbot-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v_${{ github.run_id }}
          name: Build ${{ github.run_number }} (${{ github.sha }})
          body: |
            自动构建版本
            - 提交: ${{ github.sha }}
            - 构建时间: ${{ github.run_id }}

            下载下方 `bbncbot-*.apk` 安装即可。
          files: ${{ steps.rename.outputs.apk_path }}
          prerelease: false
