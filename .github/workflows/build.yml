name: Build APK

# 在线编译：推送到 main 或手动触发时自动编译 release APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        # ubuntu-latest runner 自带 Android SDK，直接配置环境变量即可，避免 setup-android action 卡在 license 交互
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME/platforms" 2>/dev/null || true
          ls "$ANDROID_HOME/build-tools" 2>/dev/null || true
          # 若缺 android-34，用 sdkmanager 非交互安装（stdin=Yes 自动接受 license）
          if [ ! -d "$ANDROID_HOME/platforms/android-34" ]; then
            yes | sdkmanager --licenses >/dev/null 2>&1 || true
            sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate debug.keystore
        # release 复用 debug 签名以便 APK 可直接安装测试，keystore 被 .gitignore 排除，CI 上需生成
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "debug.keystore generated"
          else
            echo "debug.keystore exists"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bbncbot-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
