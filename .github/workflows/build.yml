name: Build APK

# 在线编译：推送到 main 或手动触发时自动编译 release APK 并发布到 Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 发布 Release 需要 write 权限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        # ubuntu-latest runner 自带 Android SDK，直接配置环境变量即可
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" 2>/dev/null || true
          if [ ! -d "$ANDROID_HOME/platforms/android-34" ]; then
            yes | sdkmanager --licenses >/dev/null 2>&1 || true
            sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Verify release keystore
        # 仓库已固定提交 release.keystore，保证每次 CI 签名一致，APK 可覆盖安装
        run: |
          if [ ! -f app/release.keystore ]; then
            echo "::error::app/release.keystore 不存在，请确认已提交到仓库"
            exit 1
          fi
          echo "release.keystore exists ($(stat -c%s app/release.keystore) bytes)"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Code rules check
        # 代码规则验证：确保无分身(clone)残留代码、关键文件齐全
        run: |
          echo "=== 检查无分身(clone)残留代码 ==="
          # 在 Kotlin/XML 源码中搜索分身相关关键词，命中则报错
          if grep -rnE "(isClone|pendingUserType|setPendingApp|findCloneUserHandle|launchAppForUser|scheduleHwChooserFallbackClick|handleHwChooserActivity|HwChooserOption|extra_user)" \
            app/src/main/java app/src/main/res --include="*.kt" --include="*.xml"; then
            echo "::error::检测到分身(clone)残留代码，请彻底移除后再编译"
            exit 1
          fi
          echo "✓ 无分身残留代码"
          echo ""
          echo "=== 检查 shortcuts.xml 仅含 3 个主账号快捷方式 ==="
          # 注意：用行尾锚定精确匹配子标签 <shortcut（独占一行），排除根标签 <shortcuts ...>
          SHORTCUT_COUNT=$(grep -cE "^[[:space:]]*<shortcut[[:space:]]*$" app/src/main/res/xml/shortcuts.xml)
          if [ "$SHORTCUT_COUNT" -ne 3 ]; then
            echo "::error::shortcuts.xml 应仅含 3 个快捷方式，实际 $SHORTCUT_COUNT 个"
            exit 1
          fi
          echo "✓ shortcuts.xml 含 $SHORTCUT_COUNT 个快捷方式"
          echo ""
          echo "=== 检查 AndroidManifest 无跨 user 权限 ==="
          if grep -qE "INTERACT_ACROSS_USERS" app/src/main/AndroidManifest.xml; then
            echo "::error::AndroidManifest 仍含 INTERACT_ACROSS_USERS 权限（分身专用）"
            exit 1
          fi
          echo "✓ 无跨 user 权限"
          echo ""
          echo "=== 检查桌面快捷方式功能声明齐全 ==="
          if ! grep -q "android.permission.GET_SHORTCUTS" app/src/main/AndroidManifest.xml; then
            echo "::error::AndroidManifest 缺少 GET_SHORTCUTS 权限（遍历桌面快捷方式必需）"
            exit 1
          fi
          if ! grep -q "android.intent.category.HOME" app/src/main/AndroidManifest.xml; then
            echo "::error::AndroidManifest 缺少 CATEGORY_HOME 注册（默认桌面身份必需）"
            exit 1
          fi
          echo "✓ GET_SHORTCUTS 权限 + CATEGORY_HOME 注册齐全"
          echo ""
          echo "=== 编译前规则检查通过 ==="

      - name: Build release APK
        # full flavor = 带 OCR 模型的稳定版大包（CI 发布用）
        # 日常调试用 noOcr flavor：./gradlew assembleNoOcrDebug（APK 小 ~20-30MB）
        run: ./gradlew assembleFullRelease --no-daemon --stacktrace

      - name: Verify APK signature
        # 验证 APK 已正确签名（含 v1 JAR 签名），避免再次发布未签名包导致安装失败
        run: |
          APK=app/build/outputs/apk/full/release/app-full-release.apk
          if [ ! -f "$APK" ]; then
            echo "::error::APK 不存在: $APK"
            exit 1
          fi
          echo "APK size: $(stat -c%s $APK) bytes"
          # v1 签名检查：META-INF 下应有 *.RSA/DSA/EC + CERT.SF + MANIFEST.MF
          V1=$(unzip -l "$APK" | grep -ciE "META-INF/.*\.(RSA|DSA|EC)")
          SF=$(unzip -l "$APK" | grep -c "META-INF/.*\.SF")
          MF=$(unzip -l "$APK" | grep -c "META-INF/MANIFEST.MF")
          echo "v1 signature: RSA/DSA/EC=$V1, SF=$SF, MANIFEST.MF=$MF"
          if [ "$V1" -eq 0 ] || [ "$SF" -eq 0 ] || [ "$MF" -eq 0 ]; then
            echo "::error::APK 缺少 v1 签名（国产 ROM 会提示签名冲突），请检查 signingConfig.enableV1Signing"
            exit 1
          fi
          # 用 apksigner 验证签名有效性（若可用）
          if command -v apksigner >/dev/null 2>&1; then
            apksigner verify --print-certs "$APK" | head -5
          else
            echo "apksigner not found, skip verify (v1 check passed)"
          fi
          echo "APK signature verified OK"

      - name: Rename APK with commit sha
        id: rename
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          cp app/build/outputs/apk/full/release/app-full-release.apk bbncbot-${SHORT_SHA}.apk
          echo "apk_path=bbncbot-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT
          echo "apk_name=bbncbot-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbncbot-release-apk
          path: app/build/outputs/apk/full/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v_${{ github.run_id }}
          name: Build ${{ github.run_number }} (${{ github.sha }})
          body: |
            自动构建版本
            - 提交: ${{ github.sha }}
            - 构建时间: ${{ github.run_id }}

            下载下方 `bbncbot-*.apk` 安装即可。
          files: ${{ steps.rename.outputs.apk_path }}
          prerelease: false
