name: Build APK

# 在线编译：推送到 main 或手动触发时自动编译 release APK 并发布到 Releases
#
# 触发规则：
# - push 到 main 时触发，但忽略 logs/ rules/ sessions/ 目录的变化
#   （这些目录由 App 上传日志/规则时自动写入，不是源码改动，不应触发构建）
# - workflow_dispatch 支持手动触发
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'logs/**'
      - 'rules/**'
      - 'sessions/**'
      - '*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 发布 Release 需要 write 权限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        # ubuntu-latest runner 自带 Android SDK，直接配置环境变量即可
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" 2>/dev/null || true
          if [ ! -d "$ANDROID_HOME/platforms/android-34" ]; then
            yes | sdkmanager --licenses >/dev/null 2>&1 || true
            sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Verify release keystore
        # 仓库已固定提交 release.keystore，保证每次 CI 签名一致，APK 可覆盖安装
        run: |
          if [ ! -f app/release.keystore ]; then
            echo "::error::app/release.keystore 不存在，请确认已提交到仓库"
            exit 1
          fi
          echo "release.keystore exists ($(stat -c%s app/release.keystore) bytes)"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Code rules check
        # 代码规则验证：确保无分身(clone)残留代码、关键文件齐全
        run: |
          echo "=== 检查无分身(clone)残留代码 ==="
          # 在 Kotlin/XML 源码中搜索分身相关关键词，命中则报错
          if grep -rnE "(isClone|pendingUserType|setPendingApp|findCloneUserHandle|launchAppForUser|scheduleHwChooserFallbackClick|handleHwChooserActivity|HwChooserOption|extra_user)" \
            app/src/main/java app/src/main/res --include="*.kt" --include="*.xml"; then
            echo "::error::检测到分身(clone)残留代码，请彻底移除后再编译"
            exit 1
          fi
          echo "✓ 无分身残留代码"
          echo ""
          echo "=== 检查 shortcuts.xml 仅含 3 个主账号快捷方式 ==="
          # 注意：用行尾锚定精确匹配子标签 <shortcut（独占一行），排除根标签 <shortcuts ...>
          SHORTCUT_COUNT=$(grep -cE "^[[:space:]]*<shortcut[[:space:]]*$" app/src/main/res/xml/shortcuts.xml)
          if [ "$SHORTCUT_COUNT" -ne 3 ]; then
            echo "::error::shortcuts.xml 应仅含 3 个快捷方式，实际 $SHORTCUT_COUNT 个"
            exit 1
          fi
          echo "✓ shortcuts.xml 含 $SHORTCUT_COUNT 个快捷方式"
          echo ""
          echo "=== 检查 AndroidManifest 无跨 user 权限 ==="
          if grep -qE "INTERACT_ACROSS_USERS" app/src/main/AndroidManifest.xml; then
            echo "::error::AndroidManifest 仍含 INTERACT_ACROSS_USERS 权限（分身专用）"
            exit 1
          fi
          echo "✓ 无跨 user 权限"
          echo ""
          echo "=== 检查桌面快捷方式功能声明齐全 ==="
          if ! grep -q "android.permission.GET_SHORTCUTS" app/src/main/AndroidManifest.xml; then
            echo "::error::AndroidManifest 缺少 GET_SHORTCUTS 权限（遍历桌面快捷方式必需）"
            exit 1
          fi
          if ! grep -q "android.intent.category.HOME" app/src/main/AndroidManifest.xml; then
            echo "::error::AndroidManifest 缺少 CATEGORY_HOME 注册（默认桌面身份必需）"
            exit 1
          fi
          echo "✓ GET_SHORTCUTS 权限 + CATEGORY_HOME 注册齐全"
          echo ""
          echo "=== 编译前规则检查通过 ==="

      - name: Build APKs
        # 构建三种 APK：
        # 1. noOcr release（小包，需配合 OCR APK 使用）
        # 2. full release（自带 OCR，单 APK 即可工作，推荐给安装 OCR APK 有困难的用户）
        # 3. OCR 模块（独立 APK，配合 noOcr 主包使用）
        # 注入 BUILD_LABEL=build{run_number}-{short_sha}，写入 BuildConfig 供日志打印
        run: |
          set +e
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_LABEL="build${{ github.run_number }}-${SHORT_SHA}"
          echo "Building with BUILD_LABEL=$BUILD_LABEL"
          ./gradlew assembleNoOcrRelease assembleFullRelease :ocr:assembleRelease --no-daemon --stacktrace -PBUILD_LABEL="$BUILD_LABEL" 2>&1 | tee gradle-build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            # Kotlin 编译错误格式: "e: file://...:line:col: error: message"
            # Gradle 任务失败: "* What went wrong:" 段
            ERR=$(grep -E "^e: file|^(\* )?What went wrong:|^Caused by:|error:" gradle-build.log | head -c 4000 | tr '\n' '|' | sed 's/|/ \\n /g')
            if [ -z "$ERR" ]; then ERR=$(tail -n 40 gradle-build.log | tr '\n' '|' | sed 's/|/ \\n /g' | head -c 4000); fi
            echo "::error::BUILD FAILED: $ERR"
          fi
          exit $EXIT_CODE

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify APK signatures
        # 验证三个 APK 都已正确签名（含 v1 JAR 签名），且使用同一 keystore（signature 级权限要求）
        run: |
          set -e
          MAIN_APK=app/build/outputs/apk/noOcr/release/app-noOcr-release.apk
          FULL_APK=app/build/outputs/apk/full/release/app-full-release.apk
          OCR_APK=ocr/build/outputs/apk/release/ocr-release.apk
          for APK in "$MAIN_APK" "$FULL_APK" "$OCR_APK"; do
            if [ ! -f "$APK" ]; then
              echo "::error::APK 不存在: $APK"
              exit 1
            fi
            echo "=== $APK ==="
            echo "size: $(stat -c%s $APK) bytes"
            V1=$(unzip -l "$APK" | grep -ciE "META-INF/.*\.(RSA|DSA|EC)")
            SF=$(unzip -l "$APK" | grep -c "META-INF/.*\.SF")
            MF=$(unzip -l "$APK" | grep -c "META-INF/MANIFEST.MF")
            echo "v1 signature: RSA/DSA/EC=$V1, SF=$SF, MANIFEST.MF=$MF"
            if [ "$V1" -eq 0 ] || [ "$SF" -eq 0 ] || [ "$MF" -eq 0 ]; then
              echo "::error::APK 缺少 v1 签名: $APK"
              exit 1
            fi
            if command -v apksigner >/dev/null 2>&1; then
              apksigner verify --print-certs "$APK" | head -5
            fi
          done
          echo "✓ 三个 APK 签名验证通过"

      - name: Rename APKs with commit sha
        id: rename
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          # 主 APK（noOcr release，小包，需配合 OCR APK 使用）
          cp app/build/outputs/apk/noOcr/release/app-noOcr-release.apk bbncbot-${SHORT_SHA}.apk
          # Full APK（自带 OCR，单 APK 即可工作，推荐给安装 OCR APK 有困难的用户）
          cp app/build/outputs/apk/full/release/app-full-release.apk bbncbot-full-${SHORT_SHA}.apk
          # OCR APK（独立模块，含 ML Kit 模型，装一次后不变）
          cp ocr/build/outputs/apk/release/ocr-release.apk bbncbot-ocr-${SHORT_SHA}.apk
          echo "main_apk=bbncbot-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT
          echo "full_apk=bbncbot-full-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT
          echo "ocr_apk=bbncbot-ocr-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bbncbot-release-apks
          path: |
            app/build/outputs/apk/noOcr/release/*.apk
            app/build/outputs/apk/full/release/*.apk
            ocr/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v_${{ github.run_id }}
          name: Build ${{ github.run_number }} (${{ github.sha }})
          body: |
            自动构建版本
            - 提交: ${{ github.sha }}
            - 构建时间: ${{ github.run_id }}

            ## 安装说明（推荐 full 单包方案）

            **方案 A（推荐，简单）**：只下载 `bbncbot-full-*.apk`（约 30MB，自带 OCR）
            - 一个 APK 搞定，无需安装 OCR 模块
            - 适合安装 OCR APK 有困难或不想折腾的用户
            - 更新时也只需下载这一个文件

            **方案 B（小包方案）**：下载两个 APK
            1. `bbncbot-ocr-*.apk` — OCR 模块（含中文识别模型，安装一次后无需更新）
            2. `bbncbot-*.apk` — 主应用（小包，频繁更新）

            两个 APK 必须使用同一签名（release.keystore），主应用通过 ContentProvider call() 跨进程调用 OCR 模块。

            ## 版本标识

            每个 APK 内嵌构建标识 `BUILD_LABEL`（格式 `build{number}-{commit_sha}`），可在以下位置查看：
            - 主应用 recording.log 开头：`=== recording.log cleared on app start (version=... build=build431-9a82281 ...) ===`
            - OCR 模块启动页显示"构建: build431-9a82281"
            - 录制日志 OCR 相关行包含 `ocrProviderBuild='build431-9a82281'`

            上传日志时请保留这些行，便于精准定位 APK 版本。
          files: |
            ${{ steps.rename.outputs.main_apk }}
            ${{ steps.rename.outputs.full_apk }}
            ${{ steps.rename.outputs.ocr_apk }}
          prerelease: false
